version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: manufacturing_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: manufacturing_app
    restart: "no"
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python -m backend.orchestration.pipeline_flow

volumes:
  postgres_data: